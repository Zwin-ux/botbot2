name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        run: pip install pyinstaller opencv-python-headless pytesseract mss numpy Pillow requests

      - name: Install Node.js deps
        run: npm ci

      - name: Bundle vision service (PyInstaller)
        run: npm run build:vision

      - name: Build Windows installer (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          generate_release_notes: true
